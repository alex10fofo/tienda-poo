<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="estilo.css"></head>
<body>
    <div class="container">
        <h2>Registro de Nuevo Cliente</h2>
        <form action="/registro-cliente" method="POST">
            <input type="number" name="cod" placeholder="Código Cliente (Único)" required>
            <input type="text" name="nom" placeholder="Nombre" required>
            <input type="text" name="ape" placeholder="Apellido" required>
            <input type="text" name="rfc" placeholder="RFC">
            <input type="text" name="dir" placeholder="Dirección en Chalco o zona">
            <label>Fecha Nacimiento:</label>
            <input type="date" name="fca">
            <input type="password" name="pass" placeholder="Crea una Contraseña" required>
            <label>Elige tu Avatar:</label>
<div style="display: flex; gap: 15px; margin: 15px 0;">
    <label>
        <input type="radio" name="avatar" value="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" checked>
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" width="50">
    </label>
    <label>
        <input type="radio" name="avatar" value="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" width="50">
    </label>
    <label>
        <input type="radio" name="avatar" value="https://api.dicebear.com/7.x/avataaars/svg?seed=Milo">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Milo" width="50">
    </label>
</div>
        <button type="submit">Crear Cuenta</button>
        </form>
        <br><a href="/">Cancelar</a>
    </div>
</body>
</html>
