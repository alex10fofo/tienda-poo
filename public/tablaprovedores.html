<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="estilo.css">
    <title>Gestión de Proveedores</title>
    <style>
        .header-admin {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn-salir {
            background: #475569 !important;
            padding: 8px 15px !important;
            font-size: 0.8rem !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-admin">
            <h2>Gestión de Proveedores</h2>
            <button class="btn-salir" onclick="window.location.href='/'">Volver al Menú</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>NIF</th>
                    <th>Nombre</th>
                    <th>Dirección</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="lista-prov">
                </tbody>
        </table>

        <hr>

        <div id="formulario-prov" class="carrito-box" style="border: 1px solid #ddd; background: #f9f9f9;">
            <h3 id="form-title">Añadir Nuevo Proveedor</h3>
            <form id="form-prov">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" id="nif" placeholder="NIF (Ej: PRO01)" required>
                    <input type="text" id="nombre" placeholder="Nombre de Empresa" required>
                </div>
                <input type="text" id="direccion" placeholder="Dirección completa" required style="width: 100%; margin-top: 10px;">
                <br><br>
                <button type="submit" id="btn-guardar">Guardar Datos</button>
                <button type="button" id="btn-cancelar" onclick="cancelarEdicion()" style="display:none; background: #94a3b8;">Cancelar Edición</button>
            </form>
        </div>
    </div>

    <script>
        let editando = false;


        function cargarProveedores() {
            fetch('/api/proveedores')
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('lista-prov');
                    tbody.innerHTML = "";
                    data.forEach(p => {
                        tbody.innerHTML += `
                            <tr>
                                <td><strong>${p.NIF}</strong></td>
                                <td>${p.NOMBRE}</td>
                                <td>${p.DIRECCION || 'No especificada'}</td>
                                <td>
                                    <button onclick="prepararEdicion('${p.NIF}', '${p.NOMBRE}', '${p.DIRECCION}')" style="background:#f59e0b; padding: 5px 10px; font-size: 0.8rem;">Modificar</button>
                                    <button onclick="eliminarProveedor('${p.NIF}')" style="background:#ef4444; padding: 5px 10px; font-size: 0.8rem;">Eliminar</button>
                                </td>
                            </tr>`;
                    });
                });
        }


        document.getElementById('form-prov').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const datos = {
                nif: document.getElementById('nif').value,
                nombre: document.getElementById('nombre').value,
                direccion: document.getElementById('direccion').value
            };


            const url = editando ? '/api/update-proveedor' : '/api/add-proveedor';

            fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(datos)
            })
            .then(res => {
                if(res.ok) {
                    alert(editando ? "✅ Proveedor actualizado correctamente" : "✅ Proveedor añadido con éxito");
                    cancelarEdicion();
                    cargarProveedores();
                } else {
                    alert("❌ Error al procesar los datos");
                }
            });
        });


        function eliminarProveedor(nif) {
            if(confirm(`¿Estás seguro de eliminar al proveedor ${nif}?`)) {
                fetch(`/api/delete-proveedor/${nif}`, { method: 'DELETE' })
                    .then(res => {
                        if(res.ok) {
                            cargarProveedores();
                        } else {
                            alert("❌ No se puede eliminar: Este proveedor tiene productos asociados.");
                        }
                    });
            }
        }


        function prepararEdicion(nif, nombre, direccion) {
            editando = true;
            document.getElementById('nif').value = nif;
            document.getElementById('nif').readOnly = true; // Bloqueamos el ID para no romper la BD
            document.getElementById('nif').style.backgroundColor = "#e2e8f0";
            
            document.getElementById('nombre').value = nombre;
            document.getElementById('direccion').value = direccion;
            
            document.getElementById('form-title').innerText = "✏️ Modificando Proveedor: " + nif;
            document.getElementById('btn-guardar').innerText = "Actualizar Información";
            document.getElementById('btn-cancelar').style.display = "inline-block";
        }


        function cancelarEdicion() {
            editando = false;
            document.getElementById('form-prov').reset();
            document.getElementById('nif').readOnly = false;
            document.getElementById('nif').style.backgroundColor = "#fff";
            document.getElementById('form-title').innerText = "Añadir Nuevo Proveedor";
            document.getElementById('btn-guardar').innerText = "Guardar Datos";
            document.getElementById('btn-cancelar').style.display = "none";
        }

        cargarProveedores();
    </script>
</body>
</html>
