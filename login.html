<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="estilo.css">
    <title>Acceso Cliente</title>
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <h2 style="text-align: center;">🔑 Acceso Clientes</h2>
        <form action="/login" method="POST">
            <label>ID de Usuario:</label>
            <input type="number" name="id_cliente" placeholder="Ej: 1" required style="width: 100%; margin-bottom: 15px; padding: 10px;">
            
            <label>Contraseña:</label>
            <input type="password" name="password" placeholder="Tu contraseña" required style="width: 100%; margin-bottom: 20px; padding: 10px;">
            
            <button type="submit" style="width: 100%;">Entrar a la Tienda</button>
        </form>
        <p style="text-align: center; margin-top: 20px;">
            ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
        </p>
    </div>
</body>
</html>
